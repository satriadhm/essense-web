<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 360" fill="none" aria-hidden="true">
  <defs>
    <linearGradient id="bottleGlass" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1f42"/>
      <stop offset="45%" stop-color="#252a55"/>
      <stop offset="100%" stop-color="#141836"/>
    </linearGradient>
    <linearGradient id="bottleShine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4DD9FF" stop-opacity="0.35"/>
      <stop offset="40%" stop-color="#7B5CF0" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#4DD9FF" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="liquid" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7B5CF0" stop-opacity="0.55"/>
      <stop offset="50%" stop-color="#4DD9FF" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#9D6FF5" stop-opacity="0.45"/>
    </linearGradient>
    <linearGradient id="cap" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2d2650"/>
      <stop offset="50%" stop-color="#4a3d7a"/>
      <stop offset="100%" stop-color="#1e1a38"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="8" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Soft glow behind bottle -->
  <ellipse cx="100" cy="300" rx="72" ry="28" fill="#7B5CF0" opacity="0.12" filter="url(#glow)"/>
  <!-- Cap -->
  <rect x="78" y="28" width="44" height="36" rx="8" fill="url(#cap)" stroke="rgba(77,217,255,0.15)" stroke-width="1"/>
  <ellipse cx="100" cy="28" rx="22" ry="10" fill="#3d3558" stroke="rgba(77,217,255,0.2)" stroke-width="1"/>
  <!-- Neck -->
  <path d="M88 64h24v32c0 4-2 8-6 10l-6 4v8H100v-8l-6-4c-4-2-6-6-6-10V64z" fill="#1a1f38" stroke="rgba(77,217,255,0.12)" stroke-width="1"/>
  <!-- Shoulders -->
  <path d="M70 108c0-8 6-14 14-14h32c8 0 14 6 14 14v8H70v-8z" fill="url(#bottleGlass)"/>
  <!-- Main body -->
  <rect x="62" y="116" width="76" height="168" rx="18" fill="url(#bottleGlass)" stroke="rgba(77,217,255,0.18)" stroke-width="1.5"/>
  <!-- Liquid level -->
  <rect x="66" y="180" width="68" height="100" rx="12" fill="url(#liquid)" opacity="0.9"/>
  <!-- Glass shine -->
  <path d="M74 124h18v140c0 6-4 10-10 10h-4c-4 0-6-3-6-7V124z" fill="url(#bottleShine)" opacity="0.85"/>
  <!-- Base highlight -->
  <ellipse cx="100" cy="284" rx="34" ry="10" fill="#4DD9FF" opacity="0.06"/>
</svg>
